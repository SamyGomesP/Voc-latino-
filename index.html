<!doctype html>
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=Edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
	<link rel="stylesheet" href="what-country.css">
</head>
<html>
	<body>
		<div class="box">
			<div class="form">
				<h2>Você é sul-americano?<br>
				Vamos descobrir</h2>
				<input type="text" id="pais" placeholder="Qual seu país de nascença?">
				<button>Verificar</button>
				<p id="resposta"></p>
			</div>
		</div>
		<script>
		let pais = document.getElementById("pais");
		let avancar = document.getElementsByTagName('button')[0];
		let resposta = document.getElementById("resposta");
		let box = document.getElementsByClassName("box")[0];
		avancar.addEventListener('click', clicar);
		
		function clicar() {
			box.style.backdropFilter = "blur(20px)";

				resposta.innerHTML = "INSIRA UM PAÍS!";
				break;

				document.body.style.backgroundSize = "cover";
				document.body.style.backgroundPosition = "center center";
				pais.value = "";
				break;

	</script>

	</body>
